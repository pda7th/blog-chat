version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blog-chat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: blog_chat_db
      MYSQL_USER: blog_chat_user
      MYSQL_PASSWORD: blog_chat_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
