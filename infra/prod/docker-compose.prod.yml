version: '3.8'

services:
  # ─────────────────────────────────────────────
  # MySQL 8
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    env_file: /srv/app/.env
    volumes:
      - /srv/app/mysql-data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # Drizzle 마이그레이션 (one-off, profile=migrate)
  #   deploy.sh에서: docker compose --profile migrate run --rm migrate
  # ─────────────────────────────────────────────
  migrate:
    image: ${DOCKER_IMAGE}:migrate
    env_file: /srv/app/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - migrate

  # ─────────────────────────────────────────────
  # DB Seed (one-off, profile=seed)
  #   deploy.sh에서: docker compose --profile seed run --rm seed
  # ─────────────────────────────────────────────
  seed:
    image: ${DOCKER_IMAGE}:seed
    env_file: /srv/app/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - seed

  # ─────────────────────────────────────────────
  # Next.js App
  # ─────────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE}:latest
    restart: always
    env_file: /srv/app/.env
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

  # ─────────────────────────────────────────────
  # Nginx (reverse proxy)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/app/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt — HTTPS 전환 시 활성화
      - /srv/app/certbot/www:/var/www/certbot:ro
      - /srv/app/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - app_network

  # ─────────────────────────────────────────────
  # Certbot (Let's Encrypt 인증서 갱신, profile=certbot)
  #   도메인 연결 후 최초 발급:
  #     docker compose --profile certbot run --rm certbot certonly \
  #       --webroot -w /var/www/certbot \
  #       -d your-domain.com --email you@email.com --agree-tos
  #   갱신:
  #     docker compose --profile certbot run --rm certbot renew
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - /srv/app/certbot/www:/var/www/certbot
      - /srv/app/certbot/conf:/etc/letsencrypt
    profiles:
      - certbot

networks:
  app_network:
    driver: bridge
