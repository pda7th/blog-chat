# ================================================================
# Phase 2: HTTPS 설정 (도메인 연결 + certbot 발급 완료 후 활성화)
#
# 사용 방법:
#   1. 위 server 블록의 location / 를 HTTP→HTTPS 리다이렉트로 교체
#   2. 아래 server 블록 주석 해제
#   3. your-domain.com 을 실제 도메인으로 교체
#   4. nginx 재시작: docker compose exec nginx nginx -s reload
# ================================================================

server {
    listen 80;
    server_name pda-blog-chat.site www.pda-blog-chat.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pda-blog-chat.site www.pda-blog-chat.site;

    ssl_certificate     /etc/letsencrypt/live/pda-blog-chat.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pda-blog-chat.site/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE(Server-Sent Events) 전용 설정 — 버퍼링 비활성화 필수
    location /api/chat/stream {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 핵심 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # 24시간 (연결 장시간 유지)
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
